name: "AI Work Assistant"
version: "1.0.0"
description: "Simulating email triage, code review, and data cleaning tasks."
entry_point: "env:WorkEnv"
tasks:
  - id: "task_1"
    name: "Email Triage"
    difficulty: "easy"
    grader: "graders.email_grader.grade_email"
    expected: "work"
  - id: "task_2"
    name: "Code Review"
    difficulty: "medium"
    grader: "graders.code_grader.grade_code"
    expected: ["return", "result"]
  - id: "task_3"
    name: "Data Cleaning"
    difficulty: "hard"
    grader: "graders.data_grader.grade_data"
    expected: [{"id": 1, "name": "Alice", "age": 25}, {"id": 3, "name": "Charlie", "age": 30}]
