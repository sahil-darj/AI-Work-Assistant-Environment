name: "AI Work Assistant"
version: "1.0.0"
description: "Simulating email triage, code review, and data cleaning tasks."
entry_point: "env:WorkEnv"
tasks:
  - id: "email-triage"
    difficulty: "easy"
    grader: "grader.email_grader.grade_email"
  - id: "code-review"
    difficulty: "medium"
    grader: "grader.code_grader.grade_code"
  - id: "data-cleaning"
    difficulty: "hard"
    grader: "grader.data_grader.grade_data"
