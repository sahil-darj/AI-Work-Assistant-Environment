name: AI Work Assistant
version: 1.0.0
description: Simulating email triage, code review, and data cleaning tasks.
entry_point: env:WorkEnv
tasks:
  - id: "task_1"
    name: "Email Triage"
    description: "Classify the email as spam, work, or important."
    difficulty: "easy"
    grader: "tasks.email_grader:grade_email"
    expected: "work"
  - id: "task_2"
    name: "Code Review"
    description: "Identify the bug in the Python code snippet."
    difficulty: "medium"
    grader: "tasks.code_grader:grade_code"
    expected:
      - "return"
      - "result"
  - id: "task_3"
    name: "Data Cleaning"
    description: "Clean the messy dataset by fixing types and removing errors."
    difficulty: "hard"
    grader: "tasks.data_grader:grade_data"
    expected:
      - id: 1
        name: "Alice"
        age: 25
      - id: 3
        name: "Charlie"
        age: 30
