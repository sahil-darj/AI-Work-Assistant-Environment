name: AI Work Assistant
version: "1.0.0"
description: "Simulating email triage, code review, and data cleaning tasks."
entry_point: "env:WorkEnv"
tasks:
  - id: "task_email"
    name: "Email Triage"
    description: "Classify the email as spam, work, or important."
    difficulty: "easy"
    grader: "graders:grade_email"
    expected: "work"
  - id: "task_code"
    name: "Code Review"
    description: "Identify the bug in the Python code snippet."
    difficulty: "medium"
    grader: "graders:grade_code"
    expected: "return"
  - id: "task_data"
    name: "Data Cleaning"
    description: "Clean the messy dataset by fixing types and removing errors."
    difficulty: "hard"
    grader: "graders:grade_data"
    expected: "cleaned"
  - id: "task_email_v2"
    name: "Email Triage Pro"
    description: "Advanced email classification."
    difficulty: "easy"
    grader: "graders:grade_email"
    expected: "important"
  - id: "task_code_v2"
    name: "Code Review Pro"
    description: "Advanced code bug hunting."
    difficulty: "medium"
    grader: "graders:grade_code"
    expected: "result"
  - id: "task_data_v2"
    name: "Data Cleaning Pro"
    description: "Advanced dataset normalization."
    difficulty: "hard"
    grader: "graders:grade_data"
    expected: "normalized"
